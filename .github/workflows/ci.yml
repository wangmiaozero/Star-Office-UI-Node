name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install (pnpm only, frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Syntax check
        run: |
          node --check app.js
          node --check set_state.js
          node --check scripts/enforce-runtime.js
          node --check scripts/runtime-common.js
          node --check src/routes/agents.js
          node --check src/routes/assets.js
