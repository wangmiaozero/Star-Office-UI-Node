services:
  star-office-ui-node:
    image: node:20-alpine
    container_name: star-office-ui-node
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@10.7.0 --activate && pnpm install --frozen-lockfile && pnpm start"
    ports:
      - "19000:19000"
    environment:
      - PORT=19000
      - NODE_ENV=production
    volumes:
      - ./:/app
      - /app/node_modules
    restart: unless-stopped
