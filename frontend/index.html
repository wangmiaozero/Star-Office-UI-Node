<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Star 的像素办公室</title>
    <script>
        (function () {
            try {
                var v = localStorage.getItem("starOfficeUiTheme");
                if (v === "soft" || v === "midnight" || v === "paper" || v === "pixel") {
                    document.documentElement.setAttribute("data-ui-theme", v);
                } else {
                    document.documentElement.setAttribute("data-ui-theme", "pixel");
                }
            } catch (e) {
                document.documentElement.setAttribute("data-ui-theme", "pixel");
            }
        })();
    </script>
    <script>window.__VERSION_TS__ = "{{VERSION_TIMESTAMP}}";</script>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/themes.css">
</head>
<body>
        <div id="loading-overlay">
        <div id="loading-text" data-i18n="loading.text">正在加载 Star 的像素办公室...</div>
        <div id="loading-progress-container">
            <div id="loading-progress-bar"></div>
        </div>
    </div>

    <div class="game-stage">
        <div id="game-container"></div>
    </div>

    <nav id="hud-toolbar" class="hud-toolbar" aria-label="HUD">
        <div class="hud-toolbar-inner">
            <div id="lang-bar" class="lang-bar hud-toolbar-item" aria-label="Language">
                <label class="lang-bar-label" for="lang-select"><span data-i18n="lang.label">语言</span></label>
                <select id="lang-select" class="lang-select"></select>
            </div>
            <span class="hud-toolbar-divider" aria-hidden="true"></span>
            <button type="button" id="pan-toggle" class="hud-btn hud-toolbar-btn" aria-pressed="false" data-i18n="hud.panOff">移动视野</button>
            <button type="button" id="coords-toggle" class="hud-btn hud-toolbar-btn" aria-pressed="false" data-i18n="hud.showCoords">显示坐标</button>
            <button type="button" id="fullscreen-toggle" class="hud-btn hud-toolbar-btn" aria-pressed="false" data-i18n="hud.fullscreen">全屏</button>
            <span class="hud-toolbar-divider" aria-hidden="true"></span>
            <button type="button" id="style-toggle" class="style-toggle-btn hud-toolbar-btn" title="切换界面风格">风格 · 像素</button>
            <!-- 更多 HUD 功能：在 .hud-toolbar-inner 内追加按钮即可 -->
        </div>
    </nav>

    <div id="bottom-panels">
        <div id="memo-panel">
            <div id="memo-title" data-i18n="memo.title">— 昨 日 小 记 —</div>
            <div id="memo-date"></div>
            <div class="memo-decoration">─ ─ ─ ─ ─</div>
            <div id="memo-content">
                <div id="memo-placeholder" data-i18n="memo.placeholder">加载中...</div>
            </div>
            <div class="memo-decoration">─ ─ ─ ─ ─</div>
        </div>

        <div id="control-bar">
            <div id="control-bar-title" data-i18n="control.starStatus">Star 状态</div>
            <div id="control-buttons">
                <button type="button" data-i18n="btn.idle" onclick="setState('idle')">待命</button>
                <button type="button" data-i18n="btn.writing" onclick="setState('writing')">工作</button>
                <button type="button" data-i18n="btn.syncing" onclick="setState('syncing')">同步</button>
                <button type="button" data-i18n="btn.error" onclick="setState('error')">报警</button>
            </div>
        </div>

        <div id="guest-agent-panel">
            <div id="guest-agent-panel-title" data-i18n="control.guestTitle">— 访 客 列 表 —</div>
            <div id="guest-agent-list">
                <div id="guest-loading-hint" class="guest-loading-hint" data-i18n="control.guestLoading" style="color:#9ca3af;font-size:12px;text-align:center;padding:20px 0;">正在加载访客...</div>
            </div>
        </div>
    </div>

    <div id="status-text" data-i18n="status.loading">加载中...</div>
    <div id="coords-overlay">
        <div id="coords-display">X: 0 | Y: 0</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/office.js"></script>
</body>
</html>
