<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Star 的像素办公室</title>
    <script>
        (function () {
            try {
                var v = localStorage.getItem("starOfficeUiTheme");
                if (v === "soft" || v === "midnight" || v === "paper" || v === "pixel") {
                    document.documentElement.setAttribute("data-ui-theme", v);
                } else {
                    document.documentElement.setAttribute("data-ui-theme", "pixel");
                }
            } catch (e) {
                document.documentElement.setAttribute("data-ui-theme", "pixel");
            }
        })();
    </script>
    <script>window.__VERSION_TS__ = "{{VERSION_TIMESTAMP}}";</script>
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/themes.css">
</head>
<body>
    <div id="loading-overlay">
        <div id="loading-text">正在加载 Star 的像素办公室...</div>
        <div id="loading-progress-container">
            <div id="loading-progress-bar"></div>
        </div>
    </div>

    <div class="game-stage">
        <div id="game-container"></div>
    </div>

    <div id="bottom-panels">
        <div id="memo-panel">
            <div id="memo-title">— 昨 日 小 记 —</div>
            <div id="memo-date"></div>
            <div class="memo-decoration">─ ─ ─ ─ ─</div>
            <div id="memo-content">
                <div id="memo-placeholder">加载中...</div>
            </div>
            <div class="memo-decoration">─ ─ ─ ─ ─</div>
        </div>

        <div id="control-bar">
            <div id="control-bar-title">Star 状态</div>
            <button type="button" id="style-toggle" class="style-toggle-btn" title="切换界面风格">风格 · 像素</button>
            <div id="control-buttons">
                <button type="button" onclick="setState('idle','待命')">待命</button>
                <button type="button" onclick="setState('writing','工作中')">工作</button>
                <button type="button" onclick="setState('syncing','同步中')">同步</button>
                <button type="button" onclick="setState('error','报警中')">报警</button>
            </div>
        </div>

        <div id="guest-agent-panel">
            <div id="guest-agent-panel-title">— 访 客 列 表 —</div>
            <div id="guest-agent-list">
                <div style="color:#9ca3af;font-size:12px;text-align:center;padding:20px 0;">正在加载访客...</div>
            </div>
        </div>
    </div>

    <div id="status-text">加载中...</div>
    <div id="coords-overlay">
        <div id="coords-display">X: 0 | Y: 0</div>
    </div>
    <button type="button" id="coords-toggle" class="hud-btn" aria-pressed="false">显示坐标</button>
    <button type="button" id="pan-toggle" class="hud-btn" aria-pressed="false">移动视野</button>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/office.js"></script>
</body>
</html>
